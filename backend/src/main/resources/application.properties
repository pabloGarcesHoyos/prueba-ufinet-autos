spring.application.name=prueba-ufinet-autos-backend
server.port=8080

# Adjust these defaults or override them with environment variables for your local PostgreSQL instance.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/prueba_ufinet_autos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Comma-separated frontend origins allowed to call the API from the browser.
app.cors.allowed-origins=http://localhost:5173

jwt.secret="#ft}&5(D+vgqu=y+70f@#yb*sMW!ufJz"
jwt.expiration=86400000
